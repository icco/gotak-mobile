# CI Workflow — runs on pushes to main/develop, all pull requests, and manual dispatch.
#
# This is an Expo project: native android/ios directories are generated on the fly
# via `expo prebuild` rather than being checked in.
#
# Primary validation path when contributors cannot build locally:
# lint + typecheck + tests, Android debug APK build, iOS simulator compile.
# Download artifacts from the workflow run summary.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '25'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: TypeScript
        run: yarn typecheck

      - name: Test
        run: yarn test

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate native Android code
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 21

  ios:
    name: iOS
    # Expo SDK 55's expo-modules-core uses Swift 6 strict concurrency, which only
    # compiles with Xcode 26+. The macos-15 runner tops out at Xcode 16.4 and
    # fails with `unknown attribute 'MainActor'` and MainActor-isolation errors
    # in expo-modules-core. macos-26 ships Xcode 26.2 by default, which builds.
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate native iOS code
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build (simulator)
        run: |
          cd ios
          xcodebuild -workspace gotakmobile.xcworkspace -scheme gotakmobile \
            -configuration Debug -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build
